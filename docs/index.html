<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hackropad</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>

  <a class="flag" href="https://hackclub.com" target="_blank">
    <img src="https://assets.hackclub.com/flag-orpheus-top.svg" alt="Hack Club">
  </a>

  <div class="hero">
    <h1>HACKROPAD</h1>
    <p>3-key macropad for coding shortcuts</p>

    <a class="github" href="https://github.com/YOUR_USERNAME/YOUR_REPO" target="_blank">
      View on GitHub →
    </a>
  </div>

  <model-viewer
    src="model.glb"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    style="width: 100vw; height: 75vh; background: #0a0a0a;">
  </model-viewer>

</body>
</html>
